spring:
  application:
    name: book-service

  datasource:
    url: jdbc:mysql://localhost:3306/db_books?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8086

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

feign:
  client:
    config:
      security-service:
        connectTimeout: 2000
        readTimeout: 4000
      category-service:
        connectTimeout: 2000
        readTimeout: 4000