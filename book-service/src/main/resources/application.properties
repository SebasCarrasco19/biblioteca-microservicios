spring.application.name=book-service
server.port=8084

spring.datasource.url=jdbc:mysql://localhost:3307/db_books?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.cloud.openfeign.client.config.security-service.connectTimeout=2000
spring.cloud.openfeign.client.config.security-service.readTimeout=4000

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
