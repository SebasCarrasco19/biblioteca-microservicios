spring.application.name=notification-service
server.port=8091

spring.datasource.url=jdbc:mysql://localhost:3306/db_notifications?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

feign.client.config.user-service.connectTimeout=2000
feign.client.config.user-service.readTimeout=4000