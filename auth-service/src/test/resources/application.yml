spring:
  application:
    name: auth-service-test
  datasource:
    url: jdbc:h2:mem:auth_service;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  sql:
    init:
      mode: never
  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

server:
  port: 0

jwt:
  secret: "clave_super_secreta_para_pruebas_unitarias_2026_123456789"
  expiration: 3600000
