spring.application.name=fine-service

server.port=8090

spring.datasource.url=jdbc:mysql://localhost:3307/db_fines?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.openfeign.client.config.user-service.connectTimeout=2000
spring.cloud.openfeign.client.config.user-service.readTimeout=4000

spring.cloud.openfeign.client.config.loan-service.connectTimeout=2000
spring.cloud.openfeign.client.config.loan-service.readTimeout=4000

spring.cloud.openfeign.client.config.notification-service.connectTimeout=2000
spring.cloud.openfeign.client.config.notification-service.readTimeout=4000